<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TARA - Tourist Access Registration Application</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --bg-main: #f4f7fa;
            --surface: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --primary: #4f46e5;
            --primary-hover: #3730a3;
            --success: #10b981;
            --success-hover: #059669;
            --action: #f59e0b;
            --action-hover: #d97706;
            --border: #e2e8f0;
            --border-focus: #6366f1;
            --radius-md: 8px;
            --radius-lg: 12px;
            --shadow-sm: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            --required-color: #ef4444;
            
            /* 1940s Military Typography Accent */
            --font-military: 'Courier New', Courier, monospace;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-main);
            margin: 0;
            padding: 15px; /* Compact padding for mobile viewports */
            color: var(--text-primary);
            line-height: 1.5;
            box-sizing: border-box;
        }

        .container {
            max-width: 1350px;
            margin: 0 auto;
            background: var(--surface);
            padding: 20px; /* Scaled down from 40px for mobile tapping comfort */
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
        }

        /* WARTIME TYPOGRAPHY HEADER ONLY */
        .header-document-section {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 20px;
        }

        .header-document-section .classification-mark {
            display: inline-block;
            font-family: var(--font-military);
            border: 2px solid #000;
            padding: 3px 14px;
            font-size: 13px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
            background: #fff;
            color: #000;
        }

        .header-document-section h2 {
            font-family: var(--font-military);
            font-size: 22px; /* Balanced for mobile wrapping layout */
            font-weight: 900;
            color: #000;
            margin: 0 0 8px 0;
            letter-spacing: 0.5px;
        }

        .header-document-section p {
            font-family: var(--font-military);
            color: var(--text-secondary);
            font-size: 12px;
            margin: 0;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        /* CLEAN DATA ENTRY FORMS & GRID */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        /* Responsive Breakpoints to transition beautifully to handheld terminals */
        @media (max-width: 900px) {
            .form-grid { grid-template-columns: 1fr 1fr; }
            .form-group.span-2 { grid-column: span 2; }
        }
        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .form-group.span-2 { grid-column: 1 / -1; }
            body { padding: 8px; }
            .container { padding: 15px; }
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.span-2 {
            grid-column: span 2;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .demographic-wrapper {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        label {
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
        }

        label .optional {
            color: var(--text-secondary);
            font-size: 11px;
            font-weight: 500;
            text-transform: none;
            margin-left: 4px;
        }

        label .required-star {
            color: var(--required-color);
            margin-left: 4px;
            font-size: 14px;
        }

        input, select, textarea {
            font-family: inherit;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 16px; /* Essential set at 16px to prevent iOS Safari auto-zoom issues on focus */
            color: var(--text-primary);
            background-color: #fff;
            box-sizing: border-box;
            width: 100%;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
        }

        input:hover, select:hover, textarea:hover {
            border-color: #cbd5e1;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--border-focus);
            outline: none;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        input:required, select:required {
            border-left: 4px solid var(--required-color);
        }

        input[type="file"] {
            padding: 8px;
            background: #f8fafc;
            cursor: pointer;
        }

        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }

        /* EYE-PLEASING COLORFUL INTERFACE ELEMENTS */
        .btn-container {
            margin-top: 25px;
            display: flex;
            flex-direction: column; /* Stack vertically on small mobile by default */
            gap: 12px;
        }

        @media (min-width: 600px) {
            .btn-container { flex-direction: row; }
        }

        button {
            font-family: inherit;
            padding: 14px 24px;
            font-size: 15px;
            font-weight: 700;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: var(--shadow-md);
            min-height: 48px; /* Touch target enhancement */
        }

        .btn-form {
            flex: 1;
            width: 100%;
        }

        .btn-add { 
            background-color: var(--success); 
            color: white; 
        }
        .btn-add:hover { 
            background-color: var(--success-hover); 
            transform: translateY(-1px);
        }

        .btn-export { 
            background-color: var(--primary); 
            color: white; 
        }
        .btn-export:hover { 
            background-color: var(--primary-hover); 
            transform: translateY(-1px);
        }
        
        .btn-exit-trigger {
            background-color: #fee2e2;
            border: 1px solid #fca5a5;
            color: #b91c1c;
            padding: 8px 14px;
            font-size: 12px;
            font-weight: 700;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.15s ease;
            white-space: nowrap;
            margin-top: 5px;
            width: 100%;
        }
        .btn-exit-trigger:hover {
            background-color: #b91c1c;
            color: white;
        }

        .search-container {
            margin-top: 35px;
            background: linear-gradient(135deg, #e0e7ff 0%, #e0f2fe 100%);
            padding: 20px;
            border-radius: var(--radius-lg);
            border: 1px solid #c7d2fe;
        }

        .search-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-input {
            padding: 14px 14px 14px 44px;
            border: 1px solid #cbd5e1;
            border-radius: var(--radius-md);
            font-size: 15px;
            background-color: #fff;
        }
